services:

  postgres:
    image: postgres:17
    container_name: anuncie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7
    container_name: anuncie-redis
    restart: unless-stopped
    ports:
      - "6379:6379"


volumes:

  postgres_data: